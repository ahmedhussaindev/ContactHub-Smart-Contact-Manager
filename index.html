<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContactHub - Smart Contact Manager</title>
    <link rel="stylesheet" href="./css/all.min.css">
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" href="./images/favicon.png">

    <!-- start font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <!-- end font  -->

</head>

<body>
    <header class="off-white">
        <div class="container-xxl">
            <nav class="navbar navbar-expand py-3">
                <div class="container-fluid">
                    <div class="w-100 d-flex justify-content-between">
                        <div class="logo-container me-2 d-flex align-items-center">
                            <i
                                class="logo-icon white fa-lg fa-solid fa-address-book me-2 d-flex align-items-center justify-content-center"></i>
                            <div class="">
                                <h1 class="fw-bolder m-0 fs-xl mb-1 semi-black">Contact<span class="purple">Hub</span>
                                </h1>
                                <p class="fs-xxs m-0 main-gray d-sm-block d-none">Smart Contact Manager</p>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <button class="add-btn fs-xs fw-semibold white d-flex align-items-center border-0 rounded-4"
                            id="add-contact">
                            <i class="fa-solid fa-plus"></i>
                            <span class="d-sm-block d-none">Add Contact</span>
                            <span class="d-sm-none">Add</span>
                        </button>
                        <i
                            class="nav-icon fa-solid fa-bell align-items-center justify-content-center d-sm-flex d-none rounded-4"></i>
                        <i
                            class="nav-icon fa-solid fa-gear align-items-center justify-content-center d-sm-flex d-none rounded-4"></i>
                        <div class="user-img-container">
                            <img class="w-100" src="./images/avatar-4.jpg" alt="user-image">
                        </div>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <section></section>
    </main>

    <script src="js/script.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
</body>

</html>
